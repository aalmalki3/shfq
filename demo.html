<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHFQ AI Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        (function() {
            const theme = localStorage.getItem('shfq-theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            const lang = localStorage.getItem('shfq-lang') || 'ar';
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        })();
    </script>
    <style>
        :root {
            --brand-peach: #fae8d4; --brand-apricot: #f2cdae; --brand-ice: #cde0e5;
            --brand-slate: #8f9ea6; --brand-charcoal: #333333; --brand-gold: #C9A84C;
            --brand-navy: #1E3A5F; --bg-page: #fdfcfb;
            --surface: rgba(255,255,255,0.85); --surface-solid: #ffffff;
            --text-main: #333333; --text-muted: #5c6b73;
            --border-light: rgba(205,224,229,0.5); --border-strong: rgba(143,158,166,0.35);
            --radius-sm: 8px; --radius-md: 16px; --radius-lg: 24px; --radius-xl: 32px;
        }
        [data-theme="dark"] {
            --bg-page: #1a1a1a; --surface: rgba(40,40,40,0.88); --surface-solid: #2a2a2a;
            --text-main: #f0f0f0; --text-muted: #a0aab4;
            --border-light: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.14);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Tajawal', sans-serif; background: var(--bg-page); color: var(--text-main);
            min-height: 100vh; transition: background 0.3s;
            border-top: 6px solid; border-image: linear-gradient(to right, var(--brand-peach), var(--brand-apricot), var(--brand-ice), var(--brand-slate)) 1;
        }
        [lang="en"] body { font-family: 'Inter', sans-serif; }

        /* Ambient DNA */
        .ambient-orb { position: fixed; border-radius: 50%; filter: blur(90px); z-index: -1; animation: float 22s infinite alternate; }
        .orb-1 { width: 480px; height: 480px; background: var(--brand-peach); top: -100px; right: -100px; }
        .orb-2 { width: 380px; height: 380px; background: var(--brand-ice); bottom: -50px; left: -50px; animation-delay: -5s; }
        .orb-3 { width: 260px; height: 260px; background: var(--brand-apricot); top: 40%; left: 30%; animation-delay: -10s; }
        @keyframes float { from { transform: translate(0,0) rotate(0deg); } to { transform: translate(40px, 60px) rotate(15deg); } }

        /* Components */
        header { 
            position: sticky; top: 0; z-index: 100; background: var(--surface); 
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-light);
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .data-ribbon {
            background: var(--surface); border: 1px solid var(--border-light); 
            padding: 0.65rem 1.75rem; border-radius: var(--radius-sm);
            margin: 1rem 5%; display: flex; align-items: center; gap: 10px; font-size: 0.85rem;
        }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); } 70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } }

        .btn { 
            padding: 0.7rem 1.5rem; border-radius: var(--radius-sm); border: none; font-weight: 600; cursor: pointer;
            transition: all 0.15s cubic-bezier(0.4,0,0.2,1); display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--brand-charcoal); color: white; }
        [data-theme="dark"] .btn-primary { background: var(--brand-gold); color: #1a1a1a; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(143,158,166,0.15); }
        .btn-icon { width: 40px; height: 40px; padding: 0; border-radius: 50%; justify-content: center; background: transparent; color: var(--text-muted); border: 1px solid var(--border-light); }
        .btn-icon:hover { background: var(--border-light); color: var(--text-main); }

        .theme-toggle {
            width: 50px; height: 28px; border-radius: 28px; border: 2px solid var(--border-strong);
            background: var(--border-light); position: relative; cursor: pointer;
        }
        .theme-toggle::after {
            content: ''; width: 18px; height: 18px; border-radius: 50%; background: var(--brand-gold);
            position: absolute; top: 3px; left: 3px; transition: all 0.3s;
        }
        [data-theme="dark"] .theme-toggle::after { left: 25px; background: #fff; }

        .hero { text-align: center; padding: 4rem 5%; }
        .hero h2 { font-size: clamp(1.8rem, 5.5vw, 2.6rem); font-weight: 800; margin-bottom: 1rem; }
        .hero p { color: var(--text-muted); font-size: 1.1rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; padding: 0 5% 4rem; }
        .card { 
            background: var(--surface); backdrop-filter: blur(10px); border: 1px solid var(--border-light);
            border-radius: var(--radius-lg); padding: 1.75rem; box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; gap: 1rem;
        }
        .card:hover { transform: translateY(-2px); border-color: var(--border-strong); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
        .card-title { font-size: 1.2rem; font-weight: 700; }

        /* Modal & Toast */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal { background: var(--surface-solid); border-radius: var(--radius-xl); padding: 2rem; max-width: 500px; width: 90%; animation: modalIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.85) translateY(30px); } }
        
        .input-group { margin-bottom: 1.25rem; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.75rem; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface-solid); color: var(--text-main); outline: none; }
        input:focus { border-color: var(--brand-slate); outline: 3px solid var(--brand-ice); }

        .toast-container { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
        .toast { padding: 0.85rem 1.4rem; border-radius: var(--radius-md); background: var(--surface-solid); border: 1px solid var(--border-strong); box-shadow: 0 8px 28px rgba(143,158,166,0.15); font-weight: 600; font-size: 0.9rem; animation: toastIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275); }
        .toast.success { border-inline-start: 4px solid #10b981; }
        .toast.error { border-inline-start: 4px solid #ef4444; }
        @keyframes toastIn { from { opacity:0; transform: translateY(20px); } }
    </style>
</head>
<body>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <header>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 38px; height: 38px; background: var(--brand-charcoal); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900;">S</div>
            <h1 style="font-weight: 800; font-size: 1.2rem;" data-t="brand"></h1>
        </div>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <button class="btn-ghost" onclick="toggleLang()" id="lang-label" style="background:transparent; border:none; color:var(--brand-slate); font-weight:bold; cursor:pointer;">EN</button>
            <div class="theme-toggle" onclick="toggleTheme()"></div>
            <button class="btn-icon" onclick="openAdmin()"><i data-lucide="settings"></i></button>
        </div>
    </header>

    <div class="data-ribbon">
        <div class="status-dot"></div>
        <span data-t="ribbon"></span>
    </div>

    <section class="hero">
        <h2 data-t="heroTitle"></h2>
        <p data-t="heroSub"></p>
    </section>

    <div class="grid" id="tools-grid"></div>

    <div class="modal-overlay" id="admin-overlay" onclick="handleOverlayClick(event)">
        <div class="modal">
            <h3 style="margin-bottom: 1.5rem;" data-t="adminTitle"></h3>
            <div class="input-group">
                <label data-t="labelAr"></label>
                <input type="text" id="name-ar" placeholder="...">
            </div>
            <div class="input-group">
                <label data-t="labelEn"></label>
                <input type="text" id="name-en" dir="ltr">
            </div>
            <div class="input-group">
                <label>URL</label>
                <input type="url" id="tool-url" dir="ltr">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 2rem;">
                <button class="btn btn-primary" style="flex:1" onclick="addTool()" data-t="btnAdd"></button>
                <button class="btn btn-secondary" onclick="closeAdmin()" data-t="btnClose"></button>
            </div>
            <div id="admin-list" style="margin-top: 2rem; max-height: 200px; overflow-y: auto; border-top: 1px solid var(--border-light); padding-top: 1rem;"></div>
        </div>
    </div>

    <div class="toast-container" id="toast-root"></div>

    <script>
        const t9n = {
            ar: {
                brand: "بوابة SHFQ", ribbon: "نظام الأدوات نشط - جاهز للاستخدام", heroTitle: "أدوات الذكاء الاصطناعي", heroSub: "مجموعة من الأدوات المتطورة المصممة لزيادة إنتاجيتك.",
                adminTitle: "لوحة التحكم", labelAr: "اسم الأداة (عربي)", labelEn: "اسم الأداة (إنجليزي)", btnAdd: "إضافة أداة", btnClose: "إغلاق", open: "فتح الأداة",
                msgSuccess: "✅ تمت العملية بنجاح", msgFill: "⚠️ يرجى ملء جميع الحقول المطلوبة.", msgLang: "🕌 تم تغيير اللغة إلى العربية"
            },
            en: {
                brand: "SHFQ Portal", ribbon: "Tool System Active - Ready", heroTitle: "AI Generated Tools", heroSub: "A collection of advanced utilities built to boost your productivity.",
                adminTitle: "Control Panel", labelAr: "Tool Name (Arabic)", labelEn: "Tool Name (English)", btnAdd: "Add Tool", btnClose: "Close", open: "Open Tool",
                msgSuccess: "✅ Action completed", msgFill: "⚠️ Please fill in all required fields.", msgLang: "🌍 Language changed to English"
            }
        };

        let tools = JSON.parse(localStorage.getItem('shfq_tools')) || [
            { id: 1, ar: "محلل الأكواد", en: "Code Analyzer", url: "#" }
        ];

        function t(key) { return t9n[document.documentElement.lang][key]; }

        function showToast(text, type = 'success') {
            const container = document.getElementById('toast-root');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = text;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function updateUI() {
            const lang = document.documentElement.lang;
            document.querySelectorAll('[data-t]').forEach(el => {
                el.innerText = t(el.dataset.t);
            });
            document.getElementById('lang-label').innerText = lang === 'ar' ? 'EN' : 'AR';
            renderGrid();
            renderAdminList();
        }

        function renderGrid() {
            const grid = document.getElementById('tools-grid');
            const lang = document.documentElement.lang;
            grid.innerHTML = tools.map(tool => `
                <div class="card">
                    <div class="card-title">${tool[lang]}</div>
                    <a href="${tool.url}" target="_blank" class="btn btn-primary" style="margin-top:auto; text-decoration:none; justify-content:center;">
                        ${t('open')} <i data-lucide="external-link" style="width:16px"></i>
                    </a>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function toggleLang() {
            const newLang = document.documentElement.lang === 'ar' ? 'en' : 'ar';
            document.documentElement.lang = newLang;
            document.documentElement.dir = newLang === 'ar' ? 'rtl' : 'ltr';
            localStorage.setItem('shfq-lang', newLang);
            updateUI();
            showToast(t('msgLang'));
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('shfq-theme', next);
        }

        function openAdmin() { document.getElementById('admin-overlay').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; }
        function handleOverlayClick(e) { if(e.target.id === 'admin-overlay') closeAdmin(); }

        window.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeAdmin(); });

        function addTool() {
            const nameAr = document.getElementById('name-ar').value;
            const nameEn = document.getElementById('name-en').value;
            const url = document.getElementById('tool-url').value;
            if(!nameAr || !nameEn || !url) return showToast(t('msgFill'), 'error');

            tools.push({ id: Date.now(), ar: nameAr, en: nameEn, url });
            localStorage.setItem('shfq_tools', JSON.stringify(tools));
            showToast(t('msgSuccess'));
            updateUI();
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function deleteTool(id) {
            tools = tools.filter(t => t.id !== id);
            localStorage.setItem('shfq_tools', JSON.stringify(tools));
            updateUI();
        }

        function renderAdminList() {
            const list = document.getElementById('admin-list');
            const lang = document.documentElement.lang;
            list.innerHTML = tools.map(t => `
                <div style="display:flex; justify-content:space-between; padding:0.5rem 0; font-size:0.9rem; border-bottom:1px solid var(--border-light);">
                    <span>${t[lang]}</span>
                    <button onclick="deleteTool(${t.id})" style="background:none; border:none; color:#ef4444; cursor:pointer;">حذف</button>
                </div>
            `).join('');
        }

        updateUI();
        lucide.createIcons();
    </script>
</body>
</html>
